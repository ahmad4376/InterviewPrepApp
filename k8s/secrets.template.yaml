# Template for Kubernetes secrets — DO NOT commit real values.
#
# Usage:
#   1. cp secrets.template.yaml secrets.yaml
#   2. Replace each <base64-encoded-value> with the real value:
#        echo -n "your-secret" | base64
#   3. kubectl apply -f secrets.yaml -n interview-prep
#   4. rm secrets.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: interview-prep-secrets
  namespace: interview-prep
type: Opaque
data:
  CLERK_SECRET_KEY: <base64-encoded-value>
  MONGO_URL: <base64-encoded-value>
  DEEPGRAM_API_KEY: <base64-encoded-value>
  OPENAI_API_KEY: <base64-encoded-value>
  STRIPE_SECRET_KEY: <base64-encoded-value>
  STRIPE_WEBHOOK_SECRET: <base64-encoded-value>
