# Template for Kubernetes secrets — DO NOT commit real values.
#
# Usage:
#   1. cp secrets.template.yaml secrets.yaml
#   2. Replace each <base64-encoded-value> with the real value:
#        echo -n "your-secret" | base64
#   3. kubectl apply -f secrets.yaml -n interview-prep
#   4. rm secrets.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: interview-prep-secrets
  namespace: interview-prep
type: Opaque
data:
  CLERK_SECRET_KEY: <base64-encoded-value>
  CLERK_WEBHOOK_SECRET: <base64-encoded-value>
  MONGO_URL: <base64-encoded-value>
  DEEPGRAM_API_KEY: <base64-encoded-value>
  OPENAI_API_KEY: <base64-encoded-value>
  STRIPE_SECRET_KEY: <base64-encoded-value>
  STRIPE_WEBHOOK_SECRET: <base64-encoded-value>
  STRIPE_PRICE_PRO_MONTHLY: <base64-encoded-value>
  STRIPE_PRICE_BUSINESS_MONTHLY: <base64-encoded-value>
  # Redis (Upstash) — used for caching
  UPSTASH_REDIS_REST_URL: <base64-encoded-value>
  UPSTASH_REDIS_REST_TOKEN: <base64-encoded-value>
  # Admin access (comma-separated Clerk user IDs)
  ADMIN_USER_IDS: <base64-encoded-value>
  # AES-256-GCM field encryption — generate with: npx tsx app/lib/generateEncryptionKey.ts
  ENCRYPTION_KEY: <base64-encoded-value>
  # Resend — email for mass interview invitations
  RESEND_API_KEY: <base64-encoded-value>
  # Piston self-hosted code execution
  PISTON_API_URL: <base64-encoded-value>
